name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy frontend + backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy frontend
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            --exclude README.md \
            frontend/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/ryklo/frontend/"

      - name: Deploy backend
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            --exclude node_modules \
            --exclude .env \
            --exclude .git \
            backend/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ryklo/backend/"

      - name: Install dependencies and restart API
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' << 'EOF'
          set -euo pipefail
          cd /opt/ryklo/backend
          npm install --omit=dev
          pm2 restart ryklo-api --update-env
          pm2 save
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:3001/health; then
              echo
              echo "Deploy complete"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after restart" >&2
          pm2 logs ryklo-api --lines 30 --nostream >&2 || true
          exit 1
          EOF
